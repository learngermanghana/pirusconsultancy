<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Pirus Consultancy logo</title>
  <desc id="logoDesc">Rounded blue square with the letters PC in white.</desc>
  <defs>
    <linearGradient id="pcGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>
  <rect x="16" y="16" width="224" height="224" rx="44" fill="url(#pcGradient)" />
  <text x="128" y="148" text-anchor="middle" fill="#ffffff" font-size="96" font-family="Inter, Arial, sans-serif" font-weight="700">PC</text>
</svg>
